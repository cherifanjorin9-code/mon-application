name: kuizine_app
description: "KUIZINE - Livraison de condiments et ingrédients à domicile, Porto-Novo, Bénin"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI / Design
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.5.0

  # Charts (Dashboard)
  fl_chart: ^0.68.0

  # Internationalization
  intl: ^0.19.0

  # Utils
  url_launcher: ^6.2.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
